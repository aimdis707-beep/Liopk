name: Mobile-Mode HLS Restreamer - Auto Play First Video

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6,11,16,21 * * *'

concurrency:
  group: hls-stream-group
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-stream:
    name: Run HLS Restreamer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Tools & Google Chrome & Virtual Audio
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3 python3-pip curl git xvfb pulseaudio pulseaudio-utils xdotool
        
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        pip3 install selenium webdriver-manager
        
        pulseaudio -D --exit-idle-time=-1 || true
        pactl load-module module-null-sink sink_name=VirtualSink || true
        pactl set-default-sink VirtualSink || true
        
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Create and Run Stream Server
      run: |
        cat << 'EOF' > stream_server.py
        import subprocess
        import os
        import time
        import sys
        import re
        import datetime
        import shutil
        import urllib.request
        import json
        from http.server import SimpleHTTPRequestHandler, HTTPServer
        import threading

        from selenium import webdriver
        from selenium.webdriver.chrome.service import Service as ChromeService
        from webdriver_manager.chrome import ChromeDriverManager
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.common.keys import Keys

        # 🔐 إعدادات التحكم عن بعد
        FB_POST_ID = "61591711540229_122105325825390384"
        FB_ACCESS_TOKEN = "EAANvxZBsQD30BR0Nn0kAQYFGmHcZBOZBedfuZBHWjRbpsf21WcCIjYaZARho35ACoeT7ciL2NjJIpgLMZAZCsZBgW4kHZBpRXTkcSLUXoOMFgGZAkjoZARLYZB6iZCZCvz4393TVd7REaKZBbkM9M3jH7kAujyOws5hLynwy9Oo340AJEoFzBqzUKdsqz6hdRn8pwoBx3CBaW3U"
        CONTROL_API_URL = f"https://graph.facebook.com/v18.0/{FB_POST_ID}?fields=message&access_token={FB_ACCESS_TOKEN}"

        # 📱 رابط يوتيوب الموبايل للبحث مباشرة
        INPUT_URL = "https://m.youtube.com/results?search_query=funny+videos"
        HLS_DIR = os.path.abspath("hls_stream")

        active_driver = None

        # 🐭 دالة لحقن وتحديث مؤشر الفأرة المرئي على الشاشة داخل المتصفح لكي يظهر في فيديو البث
        def update_visual_cursor(driver, x, y):
            try:
                js_cursor_code = f"""
                var cursor = document.getElementById('virtual-mouse-cursor');
                if (!cursor) {{
                    cursor = document.createElement('div');
                    cursor.id = 'virtual-mouse-cursor';
                    cursor.style.position = 'fixed';
                    cursor.style.width = '18px';
                    cursor.style.height = '18px';
                    cursor.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
                    cursor.style.border = '2px solid white';
                    cursor.style.borderRadius = '50%';
                    cursor.style.zIndex = '9999999';
                    cursor.style.pointerEvents = 'none';
                    cursor.style.boxShadow = '0 0 6px rgba(0,0,0,0.6)';
                    cursor.style.transition = 'all 0.08s ease-out';
                    document.body.appendChild(cursor);
                }}
                cursor.style.left = '{x}px';
                cursor.style.top = '{y}px';
                """
                driver.execute_script(js_cursor_code)
            except Exception as e:
                pass

        # 📡 الاستماع للتحكم عن بعد باستخدام xdotool لتحريك الماوس الحقيقي داخل نظام X11
        def remote_control_listener():
            global active_driver
            last_command_id = ""
            # ربط البيئة لـ xdotool للوصول لسطح المكتب الوهمي
            os.environ["DISPLAY"] = ":99"
            
            while True:
                if active_driver is not None:
                    try:
                        req = urllib.request.Request(CONTROL_API_URL, headers={'User-Agent': 'Mozilla/5.0'})
                        with urllib.request.urlopen(req, timeout=5) as response:
                            data = json.loads(response.read().decode())
                            message = data.get("message", "")
                            try:
                                cmd_data = json.loads(message)
                                action = cmd_data.get("action")
                                cmd_id = cmd_data.get("id")
                                
                                if action and cmd_id != last_command_id:
                                    last_command_id = cmd_id
                                    driver = active_driver
                                    
                                    if driver:
                                        x = cmd_data.get("x", 200)
                                        y = cmd_data.get("y", 400)
                                        
                                        # 1. تحريك مؤشر الماوس الحقيقي في نظام التشغيل
                                        subprocess.run(["xdotool", "mousemove", str(x), str(y)])
                                        
                                        # 2. مزامنة مؤشر الماوس المرئي في المتصفح ليظهر داخل البث
                                        update_visual_cursor(driver, x, y)
                                        
                                        if action == "move":
                                            print(f"🖱️ xdotool: تحريك الفأرة الحقيقية إلى ({x}, {y})")
                                            
                                        elif action == "click":
                                            subprocess.run(["xdotool", "click", "1"])
                                            print(f"🖱️ xdotool: نقر زر أيسر عند ({x}, {y})")
                                            
                                        elif action == "double_click":
                                            subprocess.run(["xdotool", "click", "--repeat", "2", "--delay", "100", "1"])
                                            print(f"🖱️ xdotool: نقر مزدوج عند ({x}, {y})")
                                            
                                        elif action == "right_click":
                                            subprocess.run(["xdotool", "click", "3"])
                                            print(f"🖱️ xdotool: نقر زر أيمن عند ({x}, {y})")
                                            
                                        elif action == "drag_and_drop":
                                            to_x = cmd_data.get("to_x", x)
                                            to_y = cmd_data.get("to_y", y + 150)
                                            # محاكاة السحب والإفلات عبر xdotool
                                            subprocess.run(["xdotool", "mousemove", str(x), str(y)])
                                            subprocess.run(["xdotool", "mousedown", "1"])
                                            time.sleep(0.1)
                                            subprocess.run(["xdotool", "mousemove", str(to_x), str(to_y)])
                                            time.sleep(0.1)
                                            subprocess.run(["xdotool", "mouseup", "1"])
                                            update_visual_cursor(driver, to_x, to_y)
                                            print(f"🖱️ xdotool: سحب وإفلات من ({x}, {y}) إلى ({to_x}, {to_y})")
                                            
                                        elif action == "scroll":
                                            amount = cmd_data.get("amount", -300)
                                            # في xdotool: الزر 4 هو التمرير للأعلى (Scroll Up)، والزر 5 هو التمرير للأسفل (Scroll Down)
                                            button = "5" if amount < 0 else "4"
                                            # تكرار أمر التمرير عدة مرات بناءً على القوة المطلوبة
                                            scroll_clicks = min(max(abs(amount) // 50, 1), 10)
                                            for _ in range(scroll_clicks):
                                                subprocess.run(["xdotool", "click", button])
                                                time.sleep(0.05)
                                            print(f"🖱️ xdotool: تمرير عجلات ({'أسفل' if button == '5' else 'أعلى'})")
                                            
                            except Exception as parse_err:
                                pass
                    except Exception as fetch_err:
                        pass
                time.sleep(0.3)

        def start_screen_recording_pipeline():
            global active_driver
            if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
            os.makedirs(HLS_DIR, exist_ok=True)
            
            # تشغيل شاشة وهمية بأبعاد هاتف عمودي
            subprocess.Popen(["Xvfb", ":99", "-screen", "0", "400x800x24"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            time.sleep(2)
            os.environ["DISPLAY"] = ":99"
            os.environ["PULSE_SINK"] = "VirtualSink"

            def stream_loop():
                global active_driver
                while True:
                    try:
                        chrome_options = Options()
                        chrome_options.add_argument("--no-sandbox")
                        chrome_options.add_argument("--disable-dev-shm-usage")
                        chrome_options.add_argument("--disable-gpu")
                        chrome_options.add_argument("--hide-scrollbars")
                        
                        # 📲 محاكاة متصفح الهاتف
                        mobile_emulation = {
                            "deviceMetrics": { "width": 400, "height": 800, "pixelRatio": 3.0, "touch": False },
                            "userAgent": "Mozilla/5.0 (Linux; Android 11; Pixel 5) AppleWebKit/537.36 (KHTML, integrate Gecko) Chrome/90.0.4430.91 Mobile Safari/537.36"
                        }
                        chrome_options.add_experimental_option("mobileEmulation", mobile_emulation)
                        chrome_options.add_argument("--autoplay-policy=no-user-gesture-required")

                        active_driver = webdriver.Chrome(service=ChromeService(ChromeDriverManager().install()), options=chrome_options)
                        active_driver.set_window_size(400, 800)
                        
                        active_driver.get(INPUT_URL)
                        time.sleep(8) # انتظار تحميل صفحة البحث
                        
                        # ⚡ تشغيل أول فيديو تلقائياً بمجرد فتح الصفحة
                        try:
                            js_click_first = """
                            var firstVideo = document.querySelector('ytm-media-item, ytm-video-with-context-renderer, a.media-item-thumbnail-container, a[href*="/watch"]');
                            if (firstVideo) {
                                firstVideo.click();
                                console.log("✅ First video launched automatically!");
                            }
                            """
                            active_driver.execute_script(js_click_first)
                            print("🎉 تم تشغيل أول فيديو تلقائياً بنجاح!")
                        except Exception as auto_err:
                            print(f"⚠️ فشل التشغيل التلقائي: {auto_err}")

                        time.sleep(2)

                        # وضع مؤشر الماوس الحقيقي والمرئي في المنتصف بشكل افتراضي
                        subprocess.run(["xdotool", "mousemove", "200", "400"])
                        update_visual_cursor(active_driver, 200, 400)

                        # ستايل إبراز العناصر النشطة وإخفاء المؤشرات غير المرغوب فيها
                        try:
                            active_driver.execute_script("""
                                var style = document.createElement('style');
                                style.innerHTML = '* { cursor: none !important; } :focus { outline: 5px solid red !important; outline-offset: 2px !important; }';
                                document.head.appendChild(style);
                            """)
                        except:
                            pass

                        # تسجيل الشاشة الطولية (بأبعاد الموبايل)
                        record_cmd = [
                            "ffmpeg", "-f", "x11grab", "-video_size", "400x800", "-framerate", "25", "-i", ":99.0",
                            "-f", "pulse", "-ac", "2", "-i", "VirtualSink.monitor",
                            "-c:v", "libx264", "-preset", "ultrafast", "-g", "50",
                            "-c:a", "aac", "-b:a", "128k",
                            "-f", "hls", "-hls_time", "2", "-hls_list_size", "5", "-hls_flags", "delete_segments",
                            os.path.join(HLS_DIR, "stream.m3u8")
                        ]
                        proc = subprocess.Popen(record_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                        while proc.poll() is None:
                            time.sleep(5)
                            try: _ = active_driver.current_url
                            except: break
                        proc.terminate()
                        active_driver.quit()
                    except Exception as err:
                        print(f"⚠️ خطأ متصفح: {err}")
                        time.sleep(5)
            threading.Thread(target=stream_loop, daemon=True).start()

        def run_custom_server():
            class Handler(SimpleHTTPRequestHandler):
                def __init__(self, *args, **kwargs): super().__init__(*args, directory=HLS_DIR, **kwargs)
                def end_headers(self): 
                    self.send_header('Access-Control-Allow-Origin', '*')
                    super().end_headers()
            HTTPServer(('0.0.0.0', 8000), Handler).serve_forever()

        # 📝 رفع وحفظ ملف الـ playlist.m3u لـ GitHub تلقائياً
        def update_github_playlist(url):
            try:
                content = f'#EXTM3U\n#EXTINF:-1 tvg-name="YouTube Mobile" group-title="Live",YouTube Mobile\n{url}/stream.m3u8\n'
                with open("playlist.m3u", "w") as f: f.write(content)
                subprocess.run(["git", "config", "--global", "user.name", "github-actions"])
                subprocess.run(["git", "config", "--global", "user.email", "actions@github.com"])
                subprocess.run(["git", "add", "playlist.m3u"])
                subprocess.run(["git", "commit", "-m", "Update Mobile Stream M3U Playlist"])
                subprocess.run(["git", "push"])
                print("✅ تم بنجاح إنشاء رابط الـ m3u وتحديثه في مستودع GitHub الخاص بك!")
            except Exception as e:
                print(f"⚠️ فشل تحديث Git: {e}")

        # 🔗 الحصول على رابط البث الخارجي عبر Cloudflare
        def start_tunnel():
            print("🚀 بدء نفق Cloudflare...")
            cmd = ["cloudflared", "tunnel", "--url", "http://localhost:8000"]
            proc = subprocess.Popen(cmd, stderr=subprocess.PIPE, stdout=subprocess.PIPE, text=True)
            while True:
                line = proc.stderr.readline()
                if not line:
                    time.sleep(1)
                    continue
                match = re.search(r'https://[a-zA-Z0-9.-]+\.trycloudflare\.com', line)
                if match:
                    url = match.group(0)
                    print(f"🔗 تم إنشاء الرابط السحابي: {url}")
                    update_github_playlist(url)
                    break

        if __name__ == "__main__":
            threading.Thread(target=remote_control_listener, daemon=True).start()
            start_screen_recording_pipeline()
            threading.Thread(target=run_custom_server, daemon=True).start()
            time.sleep(3)
            start_tunnel()
            time.sleep(18000)
        EOF
        
        python3 stream_server.py
