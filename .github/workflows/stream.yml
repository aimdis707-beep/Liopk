name: Go Streamer - Player-Based Restreamer Panel

on:
  workflow_dispatch:

concurrency:
  group: hls-stream-group
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-stream:
    name: Run Go Streamer Panel
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Tools, VLC Media Player & Virtual Audio
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3 python3-pip curl git xvfb pulseaudio pulseaudio-utils xdotool vlc
        
        pip3 install flask requests
        
        # إنشاء مجلد المفاتيح الآمن وتثبيت ngrok الرسمي
        sudo mkdir -p /etc/apt/keyrings
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/keyrings/ngrok.asc >/dev/null
        echo "deb [signed-by=/etc/apt/keyrings/ngrok.asc] https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        
        # تفعيل توكن Ngrok
        ngrok config add-authtoken 2rGoodQZRdc0r24rGd0j30jVwc3_4w7shjjjz3cN3hz9u9gVo
        
        # إعداد نظام الصوت الوهمي
        pulseaudio -D --exit-idle-time=-1 || true
        pactl load-module module-null-sink sink_name=VirtualSink || true
        pactl set-default-sink VirtualSink || true
        
        # تحميل Cloudflared للبث السحابي
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Create Go Streamer Script
      run: |
        cat << 'EOF' > stream_server.py
        import subprocess
        import os
        import time
        import sys
        import re
        import shutil
        import json
        import threading
        from flask import Flask, render_template_string, request, jsonify, send_from_directory

        app = Flask(__name__)

        HLS_DIR = os.path.abspath("hls_stream")
        if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
        os.makedirs(HLS_DIR, exist_ok=True)

        stream_status = "Stopped"
        output_m3u8_url = "Not Generated Yet"
        vlc_process = None
        ffmpeg_process = None
        cf_process = None

        # تشغيل الشاشة الوهمية بأبعاد HD القياسية
        subprocess.Popen(["Xvfb", ":99", "-screen", "0", "1280x720x24"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
        time.sleep(2)
        os.environ["DISPLAY"] = ":99"
        os.environ["PULSE_SINK"] = "VirtualSink"

        @app.route('/hls/<path:filename>')
        def serve_hls(filename):
            response = send_from_directory(HLS_DIR, filename)
            response.headers["Access-Control-Allow-Origin"] = "*"
            response.headers["Cache-Control"] = "no-cache, no-store, must-revalidate"
            return response

        # تصميم لوحة تحكم بسيط، فخم، متوافق كلياً مع الموبايل ومزود بأيقونات FontAwesome
        HTML_PANEL = """
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Go Streamer - لوحة التحكم</title>
            <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <style>
                :root {
                    --bg-main: #0b0f19;
                    --bg-card: #151d30;
                    --primary: #38bdf8;
                    --danger: #f87171;
                    --text: #f3f4f6;
                    --text-muted: #9ca3af;
                }
                * { box-sizing: border-box; margin: 0; padding: 0; }
                body { 
                    font-family: 'Cairo', sans-serif; 
                    background-color: var(--bg-main); 
                    color: var(--text); 
                    padding: 15px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                }
                .container { 
                    width: 100%; 
                    max-width: 500px; 
                    background: var(--bg-card); 
                    padding: 24px; 
                    border-radius: 20px; 
                    border: 1px solid #24304f;
                    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
                }
                .header { text-align: center; margin-bottom: 25px; }
                .header i { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
                .header h1 { font-size: 1.6rem; font-weight: 700; color: #fff; }
                .header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
                
                .form-group { margin-bottom: 18px; }
                .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text); }
                .input-wrapper { position: relative; }
                .input-wrapper i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }
                .form-group input { 
                    width: 100%; 
                    padding: 14px 40px 14px 12px; 
                    border-radius: 12px; 
                    border: 1.5px solid #24304f; 
                    background-color: #0b0f19; 
                    color: #fff; 
                    font-size: 0.95rem; 
                    transition: all 0.3s ease;
                }
                .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
                
                .btn-group { display: flex; gap: 12px; margin-top: 15px; }
                .btn { 
                    flex: 1; 
                    border: none; 
                    padding: 14px; 
                    font-size: 1rem; 
                    font-weight: 700; 
                    border-radius: 12px; 
                    cursor: pointer; 
                    display: flex; 
                    align-items: center; 
                    justify-content: center; 
                    gap: 8px; 
                    transition: all 0.3s ease;
                }
                .btn-start { background-color: var(--primary); color: #0b0f19; }
                .btn-start:hover { opacity: 0.9; }
                .btn-stop { background-color: #2d1f24; color: var(--danger); border: 1.5px solid rgba(248, 113, 113, 0.2); }
                .btn-stop:hover { background-color: #3f2229; }
                
                .status-card { margin-top: 25px; background: #0b0f19; padding: 18px; border-radius: 14px; border-right: 4px solid var(--primary); }
                .status-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
                .status-value { font-size: 1rem; font-weight: 700; color: #34d399; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
                
                .output-section { margin-top: 15px; }
                .output-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
                .url-box { 
                    background: #151d30; 
                    padding: 12px; 
                    border-radius: 10px; 
                    word-break: break-all; 
                    font-family: monospace; 
                    color: #fbbf24; 
                    font-size: 0.85rem; 
                    border: 1px dashed #24304f;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }
                .copy-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1.1rem; padding-left: 5px; }
            </style>
        </head>
        <body>
            <div class="container">
                <div class="header">
                    <i class="fa-solid fa-tower-broadcast"></i>
                    <h1>Go Streamer</h1>
                    <p>بث وإعادة توجيه القنوات بسهولة فائقة</p>
                </div>
                
                <div class="form-group">
                    <label>رابط البث أو الفيديو:</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-link"></i>
                        <input type="text" id="source_url" placeholder="ضع رابط القناة أو الـ M3U8...">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>النص المائي (اللوجو الثابت):</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-font"></i>
                        <input type="text" id="watermark" placeholder="اكتب النص هنا (مثال: Go Stream)...">
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-start" onclick="startRestream()">
                        <i class="fa-solid fa-play"></i> تشغيل البث
                    </button>
                    <button class="btn btn-stop" onclick="stopRestream()">
                        <i class="fa-solid fa-circle-stop"></i> إيقاف
                    </button>
                </div>
                
                <div class="status-card">
                    <div class="status-title"><i class="fa-solid fa-circle-info"></i> حالة الاتصال</div>
                    <div class="status-value" id="status">مستعد للبدء</div>
                    
                    <div class="output-section">
                        <div class="output-title"><i class="fa-solid fa-share-nodes"></i> رابط الـ M3U8 الناتج:</div>
                        <div class="url-box">
                            <span id="output_url">في انتظار التشغيل...</span>
                            <button class="copy-btn" onclick="copyUrl()"><i class="fa-regular fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            
            <script>
                let statusInterval = null;
                function startRestream() {
                    const source = document.getElementById('source_url').value;
                    const text = document.getElementById('watermark').value;
                    if(!source) { alert('الرجاء إدخال رابط البث أولاً!'); return; }
                    document.getElementById('status').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري معالجة البث ومنع التقطيع...';
                    
                    fetch('/api/start', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({source: source, watermark: text})
                    }).then(res => res.json()).then(data => { 
                        if(data.success) {
                            if(!statusInterval) checkStatus();
                        } 
                    });
                }
                function stopRestream() {
                    document.getElementById('status').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإيقاف...';
                    fetch('/api/stop', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            document.getElementById('status').innerText = 'تم إيقاف البث بالكامل';
                            document.getElementById('output_url').innerText = 'تم إنهاء الرابط.';
                        }
                    });
                }
                function checkStatus() {
                    statusInterval = setInterval(() => {
                        fetch('/api/status').then(res => res.json()).then(data => {
                            document.getElementById('status').innerText = data.status;
                            if(data.output !== "Not Generated Yet") {
                                document.getElementById('output_url').innerText = data.output;
                            } else if (data.status === "Stopped") {
                                document.getElementById('output_url').innerText = 'في انتظار بدء البث...';
                            }
                        });
                    }, 2000);
                }
                function copyUrl() {
                    const text = document.getElementById('output_url').innerText;
                    if(text && text !== "في انتظار بدء البث..." && text !== "تم إنهاء الرابط.") {
                        navigator.clipboard.writeText(text);
                        alert('تم نسخ رابط البث السحابي بنجاح!');
                    }
                }
            </script>
        </body>
        </html>
        """

        @app.route('/')
        def index(): return render_template_string(HTML_PANEL)

        @app.route('/api/status')
        def get_status():
            global stream_status, output_m3u8_url
            return jsonify({"status": stream_status, "output": output_m3u8_url})

        @app.route('/api/stop', methods=['POST'])
        def stop_restream_api():
            global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
            stream_status = "Stopped"
            output_m3u8_url = "Not Generated Yet"
            
            if vlc_process:
                try: vlc_process.terminate()
                except: pass
                vlc_process = None
            if ffmpeg_process:
                try: ffmpeg_process.terminate()
                except: pass
                ffmpeg_process = None
            if cf_process:
                try: cf_process.terminate()
                except: pass
                cf_process = None
                
            if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
            os.makedirs(HLS_DIR, exist_ok=True)
            return jsonify({"success": True})

        @app.route('/api/start', methods=['POST'])
        def start_restream_api():
            global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
            data = request.json
            source_url = data.get("source")
            watermark_text = data.get("watermark", "")
            
            if vlc_process:
                try: vlc_process.terminate()
                except: pass
            if ffmpeg_process:
                try: ffmpeg_process.terminate()
                except: pass
            if cf_process:
                try: cf_process.terminate()
                except: pass

            output_m3u8_url = "Not Generated Yet"
            if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
            os.makedirs(HLS_DIR, exist_ok=True)

            def media_stream_pipeline():
                global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
                stream_status = "Generating New Cloudflare Tunnel..."
                
                cmd = ["cloudflared", "tunnel", "--url", "http://localhost:5000"]
                cf_process = subprocess.Popen(cmd, stderr=subprocess.PIPE, stdout=subprocess.DEVNULL, text=True)
                
                attempts = 0
                while attempts < 25:
                    try:
                        line = cf_process.stderr.readline()
                        match = re.search(r'https://[a-zA-Z0-9.-]+\.trycloudflare\.com', line)
                        if match:
                            new_tunnel_url = match.group(0)
                            output_m3u8_url = f"{new_tunnel_url}/hls/stream.m3u8"
                            break
                    except Exception:
                        pass
                    time.sleep(0.5)
                    attempts += 1

                if output_m3u8_url == "Not Generated Yet":
                    output_m3u8_url = "Generating Tunnel URL... Please refresh in a moment"

                stream_status = "Opening Media Connection (Anti-Freeze)..."
                try:
                    # تعديل خيارات VLC لتعمل بدون زووم إجباري لمنع قص أطراف القناة وشعارها
                    vlc_cmd = [
                        "cvlc", 
                        "--fullscreen", 
                        "--no-video-title-show", 
                        "--no-qt-fs-controller", 
                        "--video-wallpaper",
                        "--aspect-ratio=16:9",
                        "--network-caching=5000",
                        "--file-caching=5000",
                        "--live-caching=5000",
                        "--drop-late-frames",
                        "--skip-frames",
                        source_url
                    ]
                    vlc_process = subprocess.Popen(vlc_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                    time.sleep(4)

                    subprocess.run(["xdotool", "search", "--sync", "--onlyvisible", "--class", "vlc", "windowactivate", "key", "f"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                    time.sleep(1)

                    stream_status = "Streaming Player Screen Live"
                    
                    # الفلاتر المخصصة لمنع تشوه الأبعاد واستقرار الصورة الكاملة دون قص
                    video_filters = ["-vf", "scale=1280:720,setdar=16/9"]
                    if watermark_text:
                        video_filters = ["-vf", f"scale=1280:720,setdar=16/9,drawtext=text='{watermark_text}':x=15:y=h-th-15:fontsize=24:fontcolor=white:box=1:boxcolor=black@0.5"]

                    # إعدادات الـ FFmpeg المعدلة للحصول على بث فائق الاستقرار وسرعة استجابة عالية
                    record_cmd = [
                        "ffmpeg", "-f", "x11grab", "-video_size", "1280x720", "-framerate", "25", "-i", ":99.0",
                        "-f", "pulse", "-ac", "2", "-i", "VirtualSink.monitor",
                        "-c:v", "libx264", "-preset", "ultrafast", "-tune", "zerolatency", "-g", "50",
                        "-b:v", "1500k", "-maxrate", "1500k", "-bufsize", "3000k"
                    ] + video_filters + [
                        "-c:a", "aac", "-b:a", "128k",
                        "-f", "hls", "-hls_time", "2", "-hls_list_size", "6", "-hls_flags", "delete_segments+split_by_time",
                        os.path.join(HLS_DIR, "stream.m3u8")
                    ]
                    ffmpeg_process = subprocess.Popen(record_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                except Exception as e:
                    stream_status = f"Error: {str(e)}"

            threading.Thread(target=media_stream_pipeline, daemon=True).start()
            return jsonify({"success": True})

        def start_ngrok_panel():
            subprocess.Popen(["ngrok", "http", "5000"], stdout=subprocess.DEVNULL)
            time.sleep(4)
            try:
                import requests
                res = requests.get("http://127.0.0.1:4040/api/tunnels").json()
                print(f"🔗 Panel Link: {res['tunnels'][0]['public_url']}", flush=True)
            except: pass

        if __name__ == "__main__":
            threading.Thread(target=start_ngrok_panel, daemon=True).start()
            app.run(host='0.0.0.0', port=5000)
        EOF

    - name: Run Go Streamer in Background & Prevent Canceled Error
      run: |
        nohup python3 stream_server.py > server.log 2>&1 &
        
        echo "⏳ جاري تهيئة الأنفاق وتوليد روابط لوحة التحكم وبث الـ M3U8..."
        sleep 12
        
        cat server.log | grep -E "Link:" || true
        
        while true; do
          sleep 60
        done
