name: Go Streamer - Player-Based Restreamer Panel

on:
  workflow_dispatch:

concurrency:
  group: hls-stream-group
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-stream:
    name: Run Go Streamer Panel
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Tools, VLC Media Player & Virtual Audio
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3 python3-pip curl git xvfb pulseaudio pulseaudio-utils xdotool vlc
        
        pip3 install flask requests
        
        # إنشاء مجلد المفاتيح الآمن وتثبيت ngrok الرسمي
        sudo mkdir -p /etc/apt/keyrings
        curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/keyrings/ngrok.asc >/dev/null
        echo "deb [signed-by=/etc/apt/keyrings/ngrok.asc] https://ngrok-agent.s3.amazonaws.com/ buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
        sudo apt-get update && sudo apt-get install ngrok
        
        # تفعيل توكن Ngrok
        ngrok config add-authtoken 2rGoodQZRdc0r24rGd0j30jVwc3_4w7shjjjz3cN3hz9u9gVo
        
        # إعداد نظام الصوت الوهمي
        pulseaudio -D --exit-idle-time=-1 || true
        pactl load-module module-null-sink sink_name=VirtualSink || true
        pactl set-default-sink VirtualSink || true
        
        # تحميل Cloudflared للبث السحابي
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Create Go Streamer Script
      run: |
        cat << 'EOF' > stream_server.py
        import subprocess
        import os
        import time
        import sys
        import re
        import shutil
        import json
        import threading
        from flask import Flask, render_template_string, request, jsonify, send_from_directory

        app = Flask(__name__)

        HLS_DIR = os.path.abspath("hls_stream")
        if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
        os.makedirs(HLS_DIR, exist_ok=True)

        stream_status = "Stopped"
        output_m3u8_url = "Not Generated Yet"
        vlc_process = None
        ffmpeg_process = None
        cf_process = None

        # شاشة وهمية قياسية ثابتة الاستقرار
        subprocess.Popen(["Xvfb", ":99", "-screen", "0", "1280x720x24"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
        time.sleep(2)
        os.environ["DISPLAY"] = ":99"
        os.environ["PULSE_SINK"] = "VirtualSink"

        @app.route('/hls/<path:filename>')
        def serve_hls(filename):
            response = send_from_directory(HLS_DIR, filename)
            response.headers["Access-Control-Allow-Origin"] = "*"
            response.headers["Cache-Control"] = "no-cache, no-store, must-revalidate"
            return response

        HTML_PANEL = """
        <!DOCTYPE html>
        <html lang="ar" dir="rtl">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Go Streamer - لوحة تشغيل بروابط الميديا</title>
            <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
            <style>
                body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
                .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
                h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; font-size: 2.2rem; text-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
                .form-group { margin-bottom: 20px; }
                label { display: block; margin-bottom: 8px; font-weight: bold; color: #94a3b8; }
                input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background-color: #0f172a; color: #fff; box-sizing: border-box; font-size: 1rem; }
                input[type="text"]:focus { border-color: #38bdf8; outline: none; }
                .btn-group { display: flex; gap: 15px; margin-top: 10px; }
                .btn { flex: 2; background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%); color: white; border: none; padding: 14px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }
                .btn-stop { flex: 1; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }
                .status-card { margin-top: 30px; background: #0f172a; padding: 20px; border-radius: 10px; border-left: 4px solid #38bdf8; }
                .url-box { background: #1e293b; padding: 10px; border-radius: 6px; word-break: break-all; font-family: monospace; color: #fbbf24; margin-top: 5px; border: 1px solid #475569; }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>🚀 Go Streamer (VLC Stable Mode)</h1>
                <div class="form-group">
                    <label>رابط البث أو الفيديو المراد تشغيله (يدعم جميع الروابط المباشرة والـ M3U8):</label>
                    <input type="text" id="source_url" placeholder="ضع رابط البث المباشر هنا...">
                </div>
                <div class="form-group">
                    <label>إضافة نص ثابت داخل البث (Watermark Text):</label>
                    <input type="text" id="watermark" placeholder="اكتب النص هنا ليظهر أسفل يسار البث...">
                </div>
                <div class="btn-group">
                    <button class="btn" onclick="startRestream()">Go Restream 🔥</button>
                    <button class="btn btn-stop" onclick="stopRestream()">Stop Stream 🛑</button>
                </div>
                <div class="status-card">
                    <div>الحالة الحالية: <span id="status" style="font-weight:bold; color:#34d399;">مستعد</span></div>
                    <br>
                    <div>رابط البث السحابي الجديد المستقر (M3U8):</div>
                    <div id="output_url" class="url-box">في انتظار بدء البث...</div>
                </div>
            </div>
            <script>
                let statusInterval = null;
                function startRestream() {
                    const source = document.getElementById('source_url').value;
                    const text = document.getElementById('watermark').value;
                    if(!source) { alert('الرجاء إدخال رابط البث أولاً!'); return; }
                    document.getElementById('status').innerText = 'جاري معالجة الرابط المستهدف ومنع التقطيع...';
                    
                    fetch('/api/start', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({source: source, watermark: text})
                    }).then(res => res.json()).then(data => { 
                        if(data.success) {
                            if(!statusInterval) checkStatus();
                        } 
                    });
                }
                function stopRestream() {
                    document.getElementById('status').innerText = 'جاري إيقاف البث الحالي بالكامل...';
                    fetch('/api/stop', { method: 'POST' })
                    .then(res => res.json())
                    .then(data => {
                        if(data.success) {
                            document.getElementById('status').innerText = 'تم إيقاف البث';
                            document.getElementById('output_url').innerText = 'تم إنهاء الرابط بنجاح.';
                        }
                    });
                }
                function checkStatus() {
                    statusInterval = setInterval(() => {
                        fetch('/api/status').then(res => res.json()).then(data => {
                            document.getElementById('status').innerText = data.status;
                            if(data.output !== "Not Generated Yet") {
                                document.getElementById('output_url').innerText = data.output;
                            } else if (data.status === "Stopped") {
                                document.getElementById('output_url').innerText = 'في انتظار بدء البث...';
                            }
                        });
                    }, 2000);
                }
            </script>
        </body>
        </html>
        """

        @app.route('/')
        def index(): return render_template_string(HTML_PANEL)

        @app.route('/api/status')
        def get_status():
            global stream_status, output_m3u8_url
            return jsonify({"status": stream_status, "output": output_m3u8_url})

        @app.route('/api/stop', methods=['POST'])
        def stop_restream_api():
            global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
            stream_status = "Stopped"
            output_m3u8_url = "Not Generated Yet"
            
            if vlc_process:
                try: vlc_process.terminate()
                except: pass
                vlc_process = None
            if ffmpeg_process:
                try: ffmpeg_process.terminate()
                except: pass
                ffmpeg_process = None
            if cf_process:
                try: cf_process.terminate()
                except: pass
                cf_process = None
                
            if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
            os.makedirs(HLS_DIR, exist_ok=True)
            return jsonify({"success": True})

        @app.route('/api/start', methods=['POST'])
        def start_restream_api():
            global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
            data = request.json
            source_url = data.get("source")
            watermark_text = data.get("watermark", "")
            
            if vlc_process:
                try: vlc_process.terminate()
                except: pass
            if ffmpeg_process:
                try: ffmpeg_process.terminate()
                except: pass
            if cf_process:
                try: cf_process.terminate()
                except: pass

            output_m3u8_url = "Not Generated Yet"
            if os.path.exists(HLS_DIR): shutil.rmtree(HLS_DIR)
            os.makedirs(HLS_DIR, exist_ok=True)

            def media_stream_pipeline():
                global stream_status, vlc_process, ffmpeg_process, cf_process, output_m3u8_url
                stream_status = "Generating New Cloudflare Tunnel..."
                
                cmd = ["cloudflared", "tunnel", "--url", "http://localhost:5000"]
                cf_process = subprocess.Popen(cmd, stderr=subprocess.PIPE, stdout=subprocess.PIPE, text=True)
                
                while True:
                    line = cf_process.stderr.readline()
                    if not line:
                        time.sleep(1)
                        continue
                    match = re.search(r'https://[a-zA-Z0-9.-]+\.trycloudflare\.com', line)
                    if match:
                        new_tunnel_url = match.group(0)
                        output_m3u8_url = f"{new_tunnel_url}/hls/stream.m3u8"
                        break

                stream_status = "Opening Media Connection (Anti-Freeze)..."
                try:
                    # إضافة ميزات الكاش ومحللات ديموكس لدعم روابط Xtream والروابط المباشرة التي لا تنتهي بـ m3u8
                    vlc_cmd = [
                        "cvlc", 
                        "--fullscreen", 
                        "--no-video-title-show", 
                        "--no-qt-fs-controller", 
                        "--video-wallpaper",
                        "--aspect-ratio=16:9",
                        "--network-caching=3000",
                        "--file-caching=3000",
                        "--live-caching=3000",
                        "--drop-late-frames",
                        "--skip-frames",
                        source_url
                    ]
                    vlc_process = subprocess.Popen(vlc_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                    time.sleep(4)

                    subprocess.run(["xdotool", "search", "--sync", "--onlyvisible", "--class", "vlc", "windowactivate", "key", "f"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                    time.sleep(1)

                    stream_status = "Streaming Player Screen Live"
                    
                    # ضبط أبعاد الفيديو إجبارياً للـ 16:9 وتصفية الإطارات لإنهاء مشكلة التقطيع والتشويه
                    video_filters = ["-vf", "scale=1280:720,setdar=16/9"]
                    if watermark_text:
                        video_filters = ["-vf", f"scale=1280:720,setdar=16/9,drawtext=text='{watermark_text}':x=15:y=h-th-15:fontsize=24:fontcolor=white:box=1:boxcolor=black@0.5"]

                    # إعدادات متطورة لـ FFmpeg مدعومة بمعاملات البث المستمر دون توقف (Realtime / Low Latency)
                    record_cmd = [
                        "ffmpeg", "-f", "x11grab", "-video_size", "1280x720", "-framerate", "25", "-i", ":99.0",
                        "-f", "pulse", "-ac", "2", "-i", "VirtualSink.monitor",
                        "-c:v", "libx264", "-preset", "ultrafast", "-tune", "zerolatency", "-g", "50",
                        "-b:v", "1500k", "-maxrate", "1500k", "-bufsize", "3000k"
                    ] + video_filters + [
                        "-c:a", "aac", "-b:a", "128k",
                        "-f", "hls", "-hls_time", "2", "-hls_list_size", "6", "-hls_flags", "delete_segments+split_by_time",
                        os.path.join(HLS_DIR, "stream.m3u8")
                    ]
                    ffmpeg_process = subprocess.Popen(record_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                except Exception as e:
                    stream_status = f"Error: {str(e)}"

            threading.Thread(target=media_stream_pipeline, daemon=True).start()
            return jsonify({"success": True})

        def start_ngrok_panel():
            subprocess.Popen(["ngrok", "http", "5000"], stdout=subprocess.DEVNULL)
            time.sleep(4)
            try:
                import requests
                res = requests.get("http://127.0.0.1:4040/api/tunnels").json()
                print(f"🔗 Panel Link: {res['tunnels'][0]['public_url']}", flush=True)
            except: pass

        if __name__ == "__main__":
            threading.Thread(target=start_ngrok_panel, daemon=True).start()
            app.run(host='0.0.0.0', port=5000)
        EOF

    - name: Run Go Streamer in Background & Prevent Canceled Error
      run: |
        nohup python3 stream_server.py > server.log 2>&1 &
        
        echo "⏳ جاري تهيئة الأنفاق وتوليد روابط لوحة التحكم وبث الـ M3U8..."
        sleep 12
        
        cat server.log | grep -E "Link:" || true
        
        while true; do
          sleep 60
        done
