Name: HLS Restreamer - Auto-Search & Keyboard Control

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6,11,16,21 * * *'

concurrency:
  group: hls-stream-group
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-stream:
    name: Run HLS Restreamer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Tools & Run
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3 python3-pip curl git xvfb pulseaudio pulseaudio-utils
        pip3 install selenium webdriver-manager
        
        cat << 'EOF' > stream_server.py
        import subprocess, os, time, shutil, urllib.request, json, threading
        from http.server import SimpleHTTPRequestHandler, HTTPServer
        from selenium import webdriver
        from selenium.webdriver.chrome.service import Service
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.common.keys import Keys
        from selenium.webdriver.common.action_chains import ActionChains
        from selenium.webdriver.common.by import By
        from webdriver_manager.chrome import ChromeDriverManager

        # 🔐 إعدادات التحكم
        FB_POST_ID = "61591711540229_122105325825390384"
        FB_ACCESS_TOKEN = "EAANvxZBsQD30BR0Nn0kAQYFGmHcZBOZBedfuZBHWjRbpsf21WcCIjYaZARho35ACoeT7ciL2NjJIpgLMZAZCsZBgW4kHZBpRXTkcSLUXoOMFgGZAkjoZARLYZB6iZCZCvz4393TVd7REaKZBbkM9M3jH7kAujyOws5hLynwy9Oo340AJEoFzBqzUKdsqz6hdRn8pwoBx3CBaW3U"
        CONTROL_API_URL = f"https://graph.facebook.com/v18.0/{FB_POST_ID}?fields=message&access_token={FB_ACCESS_TOKEN}"

        # 🔍 رابط البحث المباشر (تغيير funny+videos لأي موضوع)
        INPUT_URL = "https://www.youtube.com/results?search_query=funny+videos&sp=EgIQAQ%3D%3D"
        HLS_DIR = os.path.abspath("hls_stream")
        active_driver = None

        def remote_control_listener():
            global active_driver
            last_command_id = ""
            while True:
                if active_driver:
                    try:
                        req = urllib.request.Request(CONTROL_API_URL, headers={'User-Agent': 'Mozilla/5.0'})
                        with urllib.request.urlopen(req, timeout=5) as response:
                            data = json.loads(response.read().decode())
                            msg = json.loads(data.get("message", "{}"))
                            action = msg.get("action")
                            cmd_id = msg.get("id")
                            if action and cmd_id != last_command_id:
                                last_command_id = cmd_id
                                actions = ActionChains(active_driver)
                                if action == "right": actions.send_keys(Keys.TAB).perform()
                                elif action == "left": actions.key_down(Keys.SHIFT).send_keys(Keys.TAB).key_up(Keys.SHIFT).perform()
                                elif action == "down": actions.send_keys(Keys.ARROW_DOWN).perform()
                                elif action == "up": actions.send_keys(Keys.ARROW_UP).perform()
                                elif action == "click": actions.send_keys(Keys.ENTER).perform()
                    except: pass
                time.sleep(0.3)

        def start_stream():
            global active_driver
            os.makedirs(HLS_DIR, exist_ok=True)
            subprocess.Popen(["Xvfb", ":99", "-screen", "0", "1280x720x24"], stdout=subprocess.DEVNULL)
            os.environ["DISPLAY"] = ":99"
            
            opts = Options()
            opts.add_argument("--no-sandbox")
            opts.add_argument("--start-fullscreen")
            driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
            active_driver = driver
            driver.set_window_size(1280, 720)
            
            # فتح صفحة البحث مباشرة
            driver.get(INPUT_URL)
            
            # تسجيل الفيديو
            subprocess.Popen(["ffmpeg", "-f", "x11grab", "-video_size", "1280x720", "-i", ":99.0", "-f", "hls", "-hls_time", "2", os.path.join(HLS_DIR, "stream.m3u8")])
            while True: time.sleep(10)

        threading.Thread(target=remote_control_listener, daemon=True).start()
        threading.Thread(target=start_stream, daemon=True).start()
        
        class HLSHandler(SimpleHTTPRequestHandler):
            def end_headers(self): 
                self.send_header('Access-Control-Allow-Origin', '*')
                super().end_headers()
        HTTPServer(('0.0.0.0', 8000), HLSHandler).serve_forever()
        EOF
        python3 stream_server.py
