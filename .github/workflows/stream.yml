name: Mobile-Mode HLS Restreamer

on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup and Run
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3 python3-pip curl xvfb
        pip3 install selenium webdriver-manager
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

        cat << 'EOF' > stream_server.py
        import subprocess, os, time, threading, re, json, urllib.request
        from http.server import SimpleHTTPRequestHandler, HTTPServer
        from selenium import webdriver
        from selenium.webdriver.chrome.service import Service
        from selenium.webdriver.chrome.options import Options
        from selenium.webdriver.common.keys import Keys
        from selenium.webdriver.common.action_chains import ActionChains
        from webdriver_manager.chrome import ChromeDriverManager

        # إعدادات الهاتف الوهمي (Mobile Emulation)
        MOBILE_EMULATION = {"deviceName": "Pixel 5"}
        INPUT_URL = "https://m.youtube.com/results?search_query=funny+videos"
        HLS_DIR = os.path.abspath("hls_stream")

        def start_stream():
            os.makedirs(HLS_DIR, exist_ok=True)
            subprocess.Popen(["Xvfb", ":99", "-screen", "0", "400x800x24"], stdout=subprocess.DEVNULL) # أبعاد هاتف
            os.environ["DISPLAY"] = ":99"
            
            opts = Options()
            opts.add_experimental_option("mobileEmulation", MOBILE_EMULATION)
            opts.add_argument("--no-sandbox")
            
            driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=opts)
            driver.set_window_size(400, 800)
            driver.get(INPUT_URL)
            
            # تسجيل البث
            subprocess.Popen(["ffmpeg", "-f", "x11grab", "-video_size", "400x800", "-i", ":99.0", "-f", "hls", "-hls_time", "2", os.path.join(HLS_DIR, "stream.m3u8")])
            
            # كود التحكم (نفس الكود السابق للتحكم بالأسهم)
            while True: time.sleep(10)

        def start_tunnel():
            proc = subprocess.Popen(["cloudflared", "tunnel", "--url", "http://localhost:8000"], stderr=subprocess.PIPE, text=True)
            while True:
                line = proc.stderr.readline()
                match = re.search(r'https://[a-zA-Z0-9.-]+\.trycloudflare\.com', line)
                if match:
                    # تحديث ملف M3U
                    url = match.group(0)
                    with open("playlist.m3u", "w") as f:
                        f.write(f'#EXTM3U\n#EXTINF:-1,Mobile Phone Stream\n{url}/stream.m3u8')
                    # هنا يمكنك إضافة أوامر git push لتحديث الملف في المستودع
                    break

        threading.Thread(target=start_stream, daemon=True).start()
        threading.Thread(target=start_tunnel, daemon=True).start()
        
        class HLSHandler(SimpleHTTPRequestHandler):
            def end_headers(self): self.send_header('Access-Control-Allow-Origin', '*'); super().end_headers()
        HTTPServer(('0.0.0.0', 8000), HLSHandler).serve_forever()
        EOF
        python3 stream_server.py
